<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#X&Y</title>
    <style>
        /* 게시물 화면에 필요한 CSS 디자인 코드 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f6f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .post-content-box {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            min-height: 400px;
        }

        #back-btn {
            text-decoration: none;
            display: inline-block;
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            font-weight: bold;
            transition: color 0.2s;
        }

        #back-btn:hover {
            color: #000;
        }

        #post-title {
            font-size: 32px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        #post-content {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="post-content-box">
        <a href="index.html" id="back-btn">← 뒤로 가기</a>
        
        <h1 id="post-title">#X&Y</h1>
        <p id="post-content">
            새로운 URL(post_daily.html)로 접속된 일상 게시물 페이지입니다!<br><br>
            여기에 자유롭게 사진도 넣고 글도 작성하시면 됩니다.
        </p>
    </div>

</body>
</html>
